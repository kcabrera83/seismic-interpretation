<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seismic Interpretation</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .header { background: #1e293b; padding: 20px 40px; border-bottom: 2px solid #eab308; }
        .header h1 { color: #eab308; font-size: 1.6rem; }
        .header p { color: #94a3b8; font-size: 0.85rem; margin-top: 4px; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: #1e293b; border-radius: 10px; padding: 24px; border: 1px solid #334155; }
        .card h2 { color: #eab308; font-size: 1.1rem; margin-bottom: 16px; }
        label { display: block; color: #94a3b8; font-size: 0.8rem; margin-bottom: 4px; margin-top: 10px; }
        input, select { width: 100%; padding: 8px 12px; background: #0f172a; border: 1px solid #475569; border-radius: 6px; color: #e2e8f0; font-size: 0.9rem; }
        button { background: #eab308; color: #0f172a; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-weight: 600; margin-top: 16px; width: 100%; }
        button:hover { background: #ca8a04; }
        .result { background: #0f172a; border-radius: 6px; padding: 12px; margin-top: 12px; font-size: 0.85rem; white-space: pre-wrap; font-family: monospace; max-height: 300px; overflow-y: auto; }
        .status { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
        .status.ok { background: #22c55e; }
        .status.err { background: #ef4444; }
        canvas { max-height: 280px; }
        .full { grid-column: 1 / -1; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>Seismic Interpretation</h1>
        <p>Horizon Tracking & Facies Classification | Elaborado por Ing. Kelvin Cabrera</p>
    </div>
    <div class="container">
        <div class="grid">
            <div class="card">
                <h2><span class="status" id="healthDot"></span>System Health</h2>
                <div id="healthStatus">Checking...</div>
                <div id="modelInfo" style="margin-top: 12px; font-size: 0.85rem; color: #94a3b8;"></div>
            </div>
            <div class="card">
                <h2>Horizon Tracker (Porosity)</h2>
                <label>Amplitude</label><input type="number" id="amplitude" value="0.5" step="0.1">
                <label>Frequency</label><input type="number" id="frequency" value="30" step="1">
                <label>Phase</label><input type="number" id="phase" value="0.0" step="0.1">
                <label>Acoustic Impedance</label><input type="number" id="ai" value="2000" step="10">
                <label>Velocity</label><input type="number" id="velocity" value="2500" step="10">
                <label>Density</label><input type="number" id="density" value="2.2" step="0.1">
                <button onclick="runTrack()">Predict Porosity</button>
                <div class="result" id="trackResult">-</div>
            </div>
            <div class="card">
                <h2>Facies Classifier (Lithology)</h2>
                <label>Amplitude</label><input type="number" id="c_amplitude" value="-0.3" step="0.1">
                <label>Frequency</label><input type="number" id="c_frequency" value="45" step="1">
                <label>Phase</label><input type="number" id="c_phase" value="1.5" step="0.1">
                <label>Acoustic Impedance</label><input type="number" id="c_ai" value="1800" step="10">
                <label>Velocity</label><input type="number" id="c_velocity" value="2200" step="10">
                <label>Density</label><input type="number" id="c_density" value="2.0" step="0.1">
                <button onclick="runClassify()">Classify Facies</button>
                <div class="result" id="classifyResult">-</div>
            </div>
            <div class="card">
                <h2>Model Metrics</h2>
                <canvas id="metricsChart"></canvas>
            </div>
            <div class="card full">
                <h2>Prediction Comparison</h2>
                <canvas id="compareChart"></canvas>
            </div>
        </div>
    </div>
    <script>
        const API = '';
        let compareChart = null;

        async function checkHealth() {
            const r = await fetch(API + '/api/health');
            const d = await r.json();
            const dot = document.getElementById('healthDot');
            const st = document.getElementById('healthStatus');
            if (d.models_loaded) {
                dot.className = 'status ok';
                st.innerHTML = '<span style="color:#22c55e">All systems operational</span>';
            } else {
                dot.className = 'status err';
                st.innerHTML = '<span style="color:#ef4444">Models not loaded</span>';
            }
        }

        async function loadModels() {
            const r = await fetch(API + '/api/models');
            const d = await r.json();
            const info = document.getElementById('modelInfo');
            const ht = d.horizon_tracker;
            const fc = d.facies_classifier;
            info.innerHTML = `<b>Horizon:</b> ${ht.model} (R2=${ht.metrics.r2})<br><b>Facies:</b> ${fc.model} (Acc=${fc.metrics.accuracy})`;
            renderMetrics(ht.metrics, fc.metrics);
        }

        function renderMetrics(ht, fc) {
            const ctx = document.getElementById('metricsChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['R2', 'Accuracy', 'F1-Macro', '1-RMSE'],
                    datasets: [{
                        label: 'Horizon Tracker',
                        data: [ht.r2, null, null, 1 - ht.rmse],
                        backgroundColor: '#eab308'
                    }, {
                        label: 'Facies Classifier',
                        data: [null, fc.accuracy, fc.f1_macro, null],
                        backgroundColor: '#3b82f6'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#94a3b8' } } },
                    scales: {
                        x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
                        y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' }, min: 0, max: 1 }
                    }
                }
            });
        }

        async function runTrack() {
            const feat = [{
                amplitude: +document.getElementById('amplitude').value,
                frequency: +document.getElementById('frequency').value,
                phase: +document.getElementById('phase').value,
                acoustic_impedance: +document.getElementById('ai').value,
                velocity: +document.getElementById('velocity').value,
                density: +document.getElementById('density').value,
            }];
            const r = await fetch(API + '/api/track', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({features: feat})
            });
            const d = await r.json();
            document.getElementById('trackResult').textContent = `Predicted Porosity: ${d.predictions[0].toFixed(4)}`;
            addCompare('Porosity', d.predictions[0]);
        }

        async function runClassify() {
            const feat = [{
                amplitude: +document.getElementById('c_amplitude').value,
                frequency: +document.getElementById('c_frequency').value,
                phase: +document.getElementById('c_phase').value,
                acoustic_impedance: +document.getElementById('c_ai').value,
                velocity: +document.getElementById('c_velocity').value,
                density: +document.getElementById('c_density').value,
            }];
            const r = await fetch(API + '/api/classify', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({features: feat})
            });
            const d = await r.json();
            document.getElementById('classifyResult').textContent = `Lithology Class: ${d.labels[0]}\nProbabilities: ${d.probabilities[0].map((p,i) => `Class ${i}: ${(p*100).toFixed(1)}%`).join(', ')}`;
        }

        const compareData = { labels: [], values: [], colors: [] };
        function addCompare(label, value) {
            compareData.labels.push(label);
            compareData.values.push(value);
            compareData.colors.push('#eab308');
            if (compareChart) compareChart.destroy();
            const ctx = document.getElementById('compareChart').getContext('2d');
            compareChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: compareData.labels,
                    datasets: [{ label: 'Latest Predictions', data: compareData.values, backgroundColor: compareData.colors }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#94a3b8' } } },
                    scales: {
                        x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
                        y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
                    }
                }
            });
        }

        checkHealth();
        loadModels();
    </script>
</body>
</html>
